spring:
  datasource:
    writer:
      driver-class-name: com.mysql.cj.jdbc.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        connection-timeout: 60000
        maximum-pool-size: 10

    replica:
      driver-class-name: com.mysql.cj.jdbc.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        connection-timeout: 60000
        maximum-pool-size: 20

  # JPA is now manually configured in DatabaseConfig.java for production stability
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update # Keep for local dev/initial setup

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      explain-api-key: ${GEMINI_EXPLAIN_API_KEY:${GEMINI_API_KEY}}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

android:
  sha256:
    fingerprint: ${ANDROID_SHA256_FINGERPRINT:71:BC:9C:71:07:82:E2:3C:F8:55:A2:33:16:F7:FA:4C:FF:18:E5:B0:08:AD:49:BC:60:09:47:43:1F:57:44:B3}

firebase:
  credentials:
    path: ${FIREBASE_CREDENTIALS_PATH:}

logging:
  level:
    com.techpulse: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.jdbc.datasource: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
    redis:
      enabled: false

