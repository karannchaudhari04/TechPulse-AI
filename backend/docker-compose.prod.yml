# ============================================================
# docker-compose.prod.yml — ORACLE CLOUD PRODUCTION
# Usage on Oracle VM:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  backend:
    image: ${DOCKER_IMAGE:-techpulse-backend:latest}
    restart: always
    environment:
      SPRING_DATASOURCE_WRITER_URL: ${DATABASE_WRITER_URL}
      SPRING_DATASOURCE_WRITER_USERNAME: ${DATABASE_WRITER_USER}
      SPRING_DATASOURCE_WRITER_PASSWORD: ${DATABASE_WRITER_PASSWORD}
      SPRING_DATASOURCE_READER1_URL: ${DATABASE_READER_1_URL}
      SPRING_DATASOURCE_READER1_USERNAME: ${DATABASE_READER_1_USER}
      SPRING_DATASOURCE_READER1_PASSWORD: ${DATABASE_READER_1_PASSWORD}
      SPRING_DATASOURCE_READER2_URL: ${DATABASE_READER_2_URL}
      SPRING_DATASOURCE_READER2_USERNAME: ${DATABASE_READER_2_USER}
      SPRING_DATASOURCE_READER2_PASSWORD: ${DATABASE_READER_2_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8080"
    # Limits prevent OOM kill on 1GB VM
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 200M

  redis:
    image: redis:7-alpine
    container_name: techpulse-redis-prod
    restart: always
    # Ports usually not exposed in prod for Redis unless needed
    # expose:
    #   - "6379"

  # Nginx reverse proxy — handles HTTPS + port 80 forwarding
  nginx:
    image: nginx:alpine
    container_name: techpulse-nginx-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    profiles:
      - with-nginx   # Only starts when: docker compose --profile with-nginx up
