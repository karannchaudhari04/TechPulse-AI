services:
  backend:
    build: .
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_WRITER_URL: ${DATABASE_WRITER_URL}
      SPRING_DATASOURCE_WRITER_USERNAME: ${DATABASE_WRITER_USER}
      SPRING_DATASOURCE_WRITER_PASSWORD: ${DATABASE_WRITER_PASSWORD}
      SPRING_DATASOURCE_REPLICA_URL: ${DATABASE_REPLICA_URL}
      SPRING_DATASOURCE_REPLICA_USERNAME: ${DATABASE_REPLICA_USER}
      SPRING_DATASOURCE_REPLICA_PASSWORD: ${DATABASE_REPLICA_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SQL_INIT_MODE: ${SQL_INIT_MODE:-never}
    deploy:
      resources:
        limits:
          memory: 768M
    command: ["java", "-Xmx512m", "-Xms256m", "-jar", "app.jar"]
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: techpulse-redis
    restart: always
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: techpulse-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
